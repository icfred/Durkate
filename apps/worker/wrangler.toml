# Cloudflare Worker config for the Durak game server.
# See docs/decisions/0007-hosting.md and apps/worker/README.md.
name = "durak-server"
main = "src/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

# The icfred.co.uk zone is not on this Cloudflare account, so no
# `routes` / custom_domain entry. The client connects via the workers.dev
# URL (`wss://durak-server.icfred.workers.dev`), which requires
# `workers_dev = true` because newer wrangler defaults it off.
workers_dev = true

# One Durable Object class, one DO instance per match.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

# DO migrations: a single class, no historical migrations yet. The first deploy
# creates the namespace; future class renames or deletions get appended here.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# Runtime config baked into the deployed worker. For local `wrangler dev`,
# override these via `apps/worker/.dev.vars` (gitignored). The default values
# here are the production values, so a bare `wrangler deploy` ships the right
# config — no `--env` flag needed.
#
# Wrangler env splits (`[env.production]`) are intentionally not used: per-env
# blocks do not inherit `[[durable_objects.bindings]]` or `[[migrations]]`
# from the top level, and `--env <name>` appends `-<name>` to the worker name
# unless explicitly overridden, both of which broke the first prod deploy.
[vars]
ALLOWED_ORIGINS = "https://durak.icfred.co.uk"
TURN_TIMEOUT_MS = "30000"
DISCONNECT_FORFEIT_MS = "30000"
